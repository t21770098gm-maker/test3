<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Photography</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div class="site-name">My Photography</div>
    <nav class="top-nav">
      <a href="index.html" class="active">Home</a>
      <a href="albums.html">Albums</a>
      <a href="favorites.html">Favorites</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <button class="nav-arrow" id="prevBtn">&#8592;</button>
    <div class="spotlight">
      <div class="photo-frame" id="openLightboxBtn">
        <img id="mainPhoto" src="" alt="Featured Photography">
        <span class="zoom-hint">enlarge</span>
      </div>
      <p class="caption" id="photoCaption"></p>
      <div class="dot-row" id="dotRow"></div>
    </div>
    <button class="nav-arrow" id="nextBtn">&#8594;</button>
  </main>

  <footer>
    <nav class="bottom-nav">
      <a href="index.html" class="active">Home</a>
      <a href="albums.html">Albums</a>
      <a href="favorites.html">Favorites</a>
      <a href="about.html">About</a>
    </nav>
  </footer>

  <div id="lightbox" class="lightbox">
    <button class="close-btn" id="closeLightboxBtn">&times;</button>
    <button class="nav-arrow" id="lbPrev">&#8592;</button>
    <img id="lightboxImg" class="lightbox-content" src="" alt="">
    <button class="nav-arrow" id="lbNext">&#8594;</button>
  </div>

  <script>
    const photos = [
      { url: "https://picsum.photos/id/1015/900/500", album: "Nature Walks" },
      { url: "https://picsum.photos/id/1018/900/500", album: "Family Vacation 2025" },
      { url: "https://picsum.photos/id/1019/900/500", album: "Pets" },
      { url: "https://picsum.photos/id/1022/900/500", album: "Astrophotography" }
    ];

    let idx = Math.floor(Math.random() * photos.length);

    const mainPhoto = document.getElementById('mainPhoto');
    const caption = document.getElementById('photoCaption');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const dotRow = document.getElementById('dotRow');

    photos.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.addEventListener('click', () => { idx = i; update(); });
      dotRow.appendChild(d);
    });

    function update() {
      const p = photos[idx];
      mainPhoto.src = p.url;
      lightboxImg.src = p.url;
      caption.innerHTML = `From album: <strong>${p.album}</strong>`;
      dotRow.querySelectorAll('.dot').forEach((d, i) =>
        d.classList.toggle('active', i === idx));
    }

    function go(dir) {
      idx = (idx + dir + photos.length) % photos.length;
      update();
    }

    document.getElementById('prevBtn').addEventListener('click', () => go(-1));
    document.getElementById('nextBtn').addEventListener('click', () => go(1));
    document.getElementById('lbPrev').addEventListener('click', () => go(-1));
    document.getElementById('lbNext').addEventListener('click', () => go(1));

    document.getElementById('openLightboxBtn').addEventListener('click', () =>
      lightbox.classList.add('active'));
    document.getElementById('closeLightboxBtn').addEventListener('click', () =>
      lightbox.classList.remove('active'));
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) lightbox.classList.remove('active');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') lightbox.classList.remove('active');
    });

    update();
  </script>
</body>
</html>
