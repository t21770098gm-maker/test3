<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0D0D10;
            --surface: #18181C;
            --border:  #2A2A32;
            --text:    #EDE9E3;
            --muted:   #7A7A88;
            --gold:    #C8A46E;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            padding: 1.75rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--text);
            text-decoration: none;
            letter-spacing: 0.02em;
        }

        header nav {
            display: flex;
            gap: 2rem;
        }

        header nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        header nav a:hover,
        header nav a.active { color: var(--text); }

        /* Main */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 3rem 2.5rem;
        }

        .arrow-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: color 0.2s, border-color 0.2s;
        }

        .arrow-btn:hover {
            color: var(--text);
            border-color: var(--gold);
        }

        /* Spotlight */
        .spotlight-wrap {
            position: relative;
            max-width: 820px;
            width: 100%;
            cursor: zoom-in;
        }

        .spotlight-wrap img {
            width: 100%;
            display: block;
            border-radius: 4px;
            transition: opacity 0.3s;
        }

        .spotlight-wrap:hover img { opacity: 0.9; }

        /* Album tag */
        .album-tag {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(13, 13, 16, 0.82);
            border: 1px solid var(--border);
            border-left: 2px solid var(--gold);
            padding: 0.4rem 0.75rem;
            border-radius: 2px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            pointer-events: none;
        }

        .album-tag .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--gold);
            display: block;
            margin-bottom: 2px;
        }

        .album-tag .name {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.95rem;
            color: var(--text);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(7, 7, 9, 0.93);
            z-index: 100;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: min(900px, 90vw);
            max-height: 85vh;
            width: auto;
            border-radius: 4px;
            display: block;
        }

        .lightbox .close-btn {
            position: fixed;
            top: 1.5rem;
            right: 1.75rem;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, border-color 0.2s;
        }

        .lightbox .close-btn:hover {
            color: var(--text);
            border-color: var(--gold);
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border);
            padding: 1.25rem 2.5rem;
            display: flex;
            justify-content: center;
        }

        footer nav { display: flex; gap: 2rem; }

        footer nav a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        footer nav a:hover,
        footer nav a.active { color: var(--text); }

        @media (max-width: 600px) {
            header { padding: 1.25rem 1.25rem; }
            header nav { gap: 1.25rem; }
            main { padding: 1.5rem 0.75rem; gap: 0.75rem; }
            .arrow-btn { width: 36px; height: 36px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">My Photography</a>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="albums.html">Albums</a>
            <a href="favorites.html">Favorites</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main>
        <button class="arrow-btn" id="prevBtn" aria-label="Previous photo">&#8592;</button>

        <div class="spotlight-wrap" id="openLightboxBtn">
            <img id="mainPhoto" src="" alt="Spotlight photo">
            <div class="album-tag">
                <span class="label">Album</span>
                <span class="name" id="albumName"></span>
            </div>
        </div>

        <button class="arrow-btn" id="nextBtn" aria-label="Next photo">&#8594;</button>
    </main>

    <footer>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="albums.html">Albums</a>
            <a href="favorites.html">Favorites</a>
            <a href="about.html">About</a>
        </nav>
    </footer>

    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
        <button class="close-btn" id="closeLightboxBtn" aria-label="Close">&#10005;</button>
        <button class="arrow-btn" id="modalPrev" aria-label="Previous photo">&#8592;</button>
        <img id="lightboxImg" src="" alt="Enlarged photo">
        <button class="arrow-btn" id="modalNext" aria-label="Next photo">&#8594;</button>
    </div>

    <script>
        const photos = [
            { url: "https://picsum.photos/id/1015/900/500", album: "Nature Walks" },
            { url: "https://picsum.photos/id/1018/900/500", album: "Family Vacation 2025" },
            { url: "https://picsum.photos/id/1019/900/500", album: "Pets" },
            { url: "https://picsum.photos/id/1022/900/500", album: "Astrophotography" }
        ];

        let currentIndex = 0;

        const mainPhoto   = document.getElementById('mainPhoto');
        const albumName   = document.getElementById('albumName');
        const lightbox    = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        function updateDisplays() {
            const p = photos[currentIndex];
            mainPhoto.src = p.url;
            albumName.textContent = p.album;
            lightboxImg.src = p.url;
        }

        function goBack()    { currentIndex = (currentIndex - 1 + photos.length) % photos.length; updateDisplays(); }
        function goForward() { currentIndex = (currentIndex + 1) % photos.length; updateDisplays(); }

        function openLightbox()  { lightbox.classList.add('open'); }
        function closeLightbox() { lightbox.classList.remove('open'); }

        document.getElementById('prevBtn').addEventListener('click', goBack);
        document.getElementById('nextBtn').addEventListener('click', goForward);
        document.getElementById('modalPrev').addEventListener('click', goBack);
        document.getElementById('modalNext').addEventListener('click', goForward);
        document.getElementById('openLightboxBtn').addEventListener('click', openLightbox);
        document.getElementById('closeLightboxBtn').addEventListener('click', closeLightbox);

        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape')     closeLightbox();
            if (e.key === 'ArrowLeft')  goBack();
            if (e.key === 'ArrowRight') goForward();
        });

        currentIndex = Math.floor(Math.random() * photos.length);
        updateDisplays();
    </script>
</body>
</html>
