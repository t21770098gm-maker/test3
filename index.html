<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="albums.html">Albums</a>
            <a href="favorites.html">Favorites</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="gallery-layout">
        <button class="nav-arrow" id="prevBtn">&#8592;</button>
        
        <div class="gallery-center">
            <div class="photo-container" id="openLightboxBtn">
                <img id="mainPhoto" src="" alt="Featured Photography">
            </div>
            <div class="caption" id="photoCaption"></div>
        </div>
        
        <button class="nav-arrow" id="nextBtn">&#8594;</button>
    </main>

    <footer>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="albums.html">Albums</a>
            <a href="favorites.html">Favorites</a>
            <a href="about.html">About</a>
        </nav>
    </footer>

    <div id="lightbox" class="lightbox">
        <span class="close-btn" id="closeLightboxBtn">&times;</span>
        <button class="nav-arrow" id="modalPrev">&#8592;</button>
        <img id="lightboxImg" class="lightbox-content" src="">
        <button class="nav-arrow" id="modalNext">&#8594;</button>
    </div>

    <script>
        // Photo Array with album information
        const photos = [
            { url: "https://picsum.photos/id/1015/900/500", album: "Nature Walks" },
            { url: "https://picsum.photos/id/1018/900/500", album: "Family Vacation 2025" },
            { url: "https://picsum.photos/id/1019/900/500", album: "Pets" },
            { url: "https://picsum.photos/id/1022/900/500", album: "Astrophotography" }
        ];

        let currentIndex = 0;
        
        // Element references
        const mainImgElement = document.getElementById('mainPhoto');
        const captionElement = document.getElementById('photoCaption');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');

        // Pick a random photo on initial page load
        function loadRandomPhoto() {
            currentIndex = Math.floor(Math.random() * photos.length);
            updateDisplays();
        }

        // Update both the main page and the lightbox
        function updateDisplays() {
            const currentPhoto = photos[currentIndex];
            
            // Update main page
            mainImgElement.src = currentPhoto.url;
            captionElement.innerHTML = `Found in album: <strong>${currentPhoto.album}</strong>`;
            
            // Update lightbox
            lightboxImg.src = currentPhoto.url;
        }

        // Arrow Navigation Logic
        function goBack() {
            currentIndex = (currentIndex - 1 + photos.length) % photos.length;
            updateDisplays();
        }

        function goForward() {
            currentIndex = (currentIndex + 1) % photos.length;
            updateDisplays();
        }

        // Attach click events to Main Page Arrows
        document.getElementById('prevBtn').addEventListener('click', goBack);
        document.getElementById('nextBtn').addEventListener('click', goForward);

        // Attach click events to Lightbox Arrows
        document.getElementById('modalPrev').addEventListener('click', goBack);
        document.getElementById('modalNext').addEventListener('click', goForward);

        // Lightbox Open/Close Logic
        document.getElementById('openLightboxBtn').addEventListener('click', () => {
            lightbox.classList.add('active');
        });

        document.getElementById('closeLightboxBtn').addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        // Close lightbox if user clicks on the dark background
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        // Close lightbox with Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('active')) {
                lightbox.classList.remove('active');
            }
        });

        // Start the gallery
        loadRandomPhoto();
    </script>
</body>
</html>
