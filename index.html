<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photography</title>
    <link rel="stylesheet" href="styles2.css">
    
    <style>
        /* LAYOUT ADJUSTMENTS (Removing the sidebar impact) */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: var(--dark-bg); /* Use your palette */
        }

        /* Top Navigation Bar */
        .top-nav {
            width: 100%;
            padding: 30px;
            background-color: var(--dark-bg);
            display: flex;
            justify-content: flex-start; /* Or 'center' if you prefer */
            gap: 25px;
        }

        .top-nav a {
            text-decoration: none;
            color: var(--peach);
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: lowercase;
            transition: color 0.3s;
        }

        .top-nav a:hover {
            color: var(--orange);
            text-decoration: underline;
        }

        /* Main Content - Centered Gallery */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .gallery-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            max-width: 1100px;
        }

        /* Navigation Arrows */
        .nav-btn {
            background: none;
            border: none;
            font-size: 4rem;
            color: var(--orange);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .nav-btn:hover { transform: scale(1.2); }

        /* The Photo Container */
        .slideshow {
            flex-grow: 1;
            background-color: var(--dark-accent);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            max-width: 900px;
        }

        #slideshow-image {
            width: 100%;
            height: 550px;
            object-fit: contain; /* Ensures the whole photo is visible */
            display: block;
            cursor: pointer;
            background-color: #000; /* Black background inside frame for photos */
        }

        .slideshow-info {
            padding: 20px;
            background-color: var(--brown);
            text-align: center;
            color: var(--dark-bg);
        }

        /* Footer */
        footer {
            padding: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* LIGHTBOX STYLES */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .lightbox-content {
            max-width: 95%;
            max-height: 90vh;
            object-fit: contain;
        }
        .close-btn {
            position: absolute;
            top: 20px; right: 40px;
            color: white;
            font-size: 3rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <a href="index.html">Home</a>
        <a href="albums.html">Albums</a>
        <a href="favorites.html">Favorites</a>
        <a href="about.html">About</a>
    </header>

    <main class="home-main">
        <div class="gallery-wrapper">
            
            <button class="nav-btn" id="prevBtn">&#8592;</button>

            <div class="slideshow">
                <img id="slideshow-image" src="" alt="Photography">
                <div class="slideshow-info">
                    <p id="photo-album">Album: Loading...</p>
                </div>
            </div>

            <button class="nav-btn" id="nextBtn">&#8594;</button>
