<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites - My Photography</title>
    <style>
        /* Base Page Setup with your Colors and Fonts */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Garamond', serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #EAE0CC; /* Cream background */
            color: #4D6A6D; /* Teal text */
        }

        /* Top Navigation */
        header { padding: 20px 30px; }
        nav { display: flex; gap: 20px; }
        nav a {
            text-decoration: none;
            color: #4D6A6D;
            font-size: 1.3rem;
            /* Respects the exact capitalization you type in the HTML */
            text-transform: none; 
            transition: color 0.3s ease;
        }
        nav a:hover { color: #C9ADA1; } /* Rose hover */

        /* Active Page Indicator */
        nav a.active {
            text-decoration: underline;
            text-decoration-color: #798478; /* Olive underline */
            text-decoration-thickness: 2px;
            text-underline-offset: 6px;
        }

        /* Main Favorites Layout */
        main.favorites-main {
            flex: 1; 
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* 2-Column Grid matching your sketch */
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px; /* Lots of breathing room between stories */
            width: 100%;
            max-width: 1000px;
        }

        /* Individual Card styling */
        .story-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none; /* Removes link styling from text */
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .story-card:hover {
            transform: translateY(-5px); /* Slight lift effect on hover */
        }

        /* The Black Square Photo Container */
        .story-card img {
            width: 100%;
            aspect-ratio: 4 / 3; /* Slightly rectangular/square to match sketch */
            background-color: #000000;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Title and Date underneath */
        .card-caption {
            font-size: 1.4rem;
            text-align: center;
        }

        /* Centered Footer Navigation */
        footer {
            padding: 40px 30px;
            display: flex;
            justify-content: center;
        }

        /* Mobile Optimization: Stacks to 1 column on smaller screens */
        @media (max-width: 768px) {
            .favorites-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="albums.html">Albums</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="favorites-main">
        <div class="favorites-grid">
            
            <a href="story-paris.html" class="story-card">
                <img src="https://picsum.photos/id/1015/800/600" alt="River Valley">
                <div class="card-caption">River Valley - Oct 2023</div>
            </a>

            <a href="story-mountains.html" class="story-card">
                <img src="https://picsum.photos/id/1018/800/600" alt="Mountain Pass">
                <div class="card-caption">Mountain Pass - Jan 2024</div>
            </a>

            <a href="story-ocean.html" class="story-card">
                <img src="https://picsum.photos/id/1019/800/600" alt="Coastal Sunset">
                <div class="card-caption">Coastal Sunset - May 2022</div>
            </a>

            <a href="story-city.html" class="story-card">
                <img src="https://picsum.photos/id/1022/800/600" alt="Neon Streets">
                <div class="card-caption">Neon Streets - Mar 2024</div>
            </a>

        </div>
    </main>

    <footer>
        <nav>
            <a href="index.html">Home</a>
            <a href="albums.html">Albums</a>
            <a href="favorites.html" class="active">Favorites</a>
            <a href="about.html">About</a>
        </nav>
    </footer>

</body>
</html>
